name: Daily price update

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase Edge Function
        env:
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_FUNCTION_URL}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "Missing required secrets: SUPABASE_FUNCTION_URL and/or SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi

          base_url="${SUPABASE_FUNCTION_URL%/}"
          case "${base_url}" in
            */update-prices)
              endpoint="${base_url}"
              ;;
            *.functions.supabase.co|*.functions.supabase.co/*)
              endpoint="${base_url}/update-prices"
              ;;
            */functions/v1)
              endpoint="${base_url}/update-prices"
              ;;
            */functions/v1/*)
              endpoint="${base_url}"
              ;;
            *)
              endpoint="${base_url}/functions/v1/update-prices"
              ;;
          esac
          echo "Calling ${endpoint}"

          http_code=$(curl --silent --show-error \
            --request POST "${endpoint}" \
            --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            --header "Content-Type: application/json" \
            --data '{}' \
            --write-out "%{http_code}" \
            --output /tmp/resp.json)

          echo "HTTP ${http_code}"
          echo "Response:"
          cat /tmp/resp.json
          echo

          if [ "${http_code}" -ge 400 ]; then
            exit 1
          fi
