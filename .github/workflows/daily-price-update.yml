name: Daily price update

on:
  schedule:
    - cron: "15 4 * * *"
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Supabase Edge Function
        env:
          SUPABASE_FUNCTION_URL: ${{ secrets.SUPABASE_FUNCTION_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_FUNCTION_URL:-}" ]; then
            echo "Missing required secret: SUPABASE_FUNCTION_URL"
            exit 1
          fi

          base_url="${SUPABASE_FUNCTION_URL%/}"
          case "${base_url}" in
            */update-prices)
              endpoint="${base_url}"
              ;;
            *.functions.supabase.co|*.functions.supabase.co/*)
              endpoint="${base_url}/update-prices"
              ;;
            */functions/v1)
              endpoint="${base_url}/update-prices"
              ;;
            */functions/v1/*)
              endpoint="${base_url}"
              ;;
            *)
              endpoint="${base_url}/functions/v1/update-prices"
              ;;
          esac
          echo "Calling ${endpoint}"

          auth_headers=()
          auth_mode="none"
          if [ -n "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            auth_headers=(
              --header "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}"
              --header "apikey: ${SUPABASE_SERVICE_ROLE_KEY}"
            )
            auth_mode="service_role"
          elif [ -n "${SUPABASE_ANON_KEY:-}" ]; then
            auth_headers=(
              --header "Authorization: Bearer ${SUPABASE_ANON_KEY}"
              --header "apikey: ${SUPABASE_ANON_KEY}"
            )
            auth_mode="anon"
          fi
          echo "Auth mode: ${auth_mode}"

          max_attempts=3
          attempt=1
          http_code=000
          curl_exit_code=1

          while [ "${attempt}" -le "${max_attempts}" ]; do
            echo "Attempt ${attempt}/${max_attempts}"

            set +e
            curl_output=$(curl --silent --show-error \
              --request POST "${endpoint}" \
              "${auth_headers[@]}" \
              --header "Content-Type: application/json" \
              --data '{}' \
              --connect-timeout 10 \
              --max-time 45 \
              --retry 2 \
              --retry-delay 2 \
              --retry-connrefused \
              --write-out "%{http_code}" \
              --output /tmp/resp.json 2>&1)
            curl_exit_code=$?
            set -e

            if [ "${curl_exit_code}" -eq 0 ]; then
              http_code="${curl_output}"
              echo "HTTP ${http_code}"
              echo "Response:"
              cat /tmp/resp.json
              echo

              if [ "${http_code}" -lt 400 ]; then
                break
              fi
            else
              echo "curl failed with exit code ${curl_exit_code}: ${curl_output}"
            fi

            if [ "${attempt}" -lt "${max_attempts}" ]; then
              echo "Request failed; waiting before retry..."
              sleep 5
            fi
            attempt=$((attempt + 1))
          done

          if [ "${curl_exit_code}" -ne 0 ] || [ "${http_code}" -ge 400 ]; then
            echo "Final attempt returned HTTP ${http_code}"
            exit 1
          fi
